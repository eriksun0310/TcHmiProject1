<?xml version="1.0" encoding="UTF-8"?>
<!--
  GD-SLM 機台示意圖
  用途：TE2000 TcHmiImage 元件
  viewBox：320 x 100
  軸標籤 ID：axis-a / axis-b / axis-c / axis-d
  使用方式：
    - 靜態顯示：直接載入此 SVG 至 TcHmiImage.SrcIsUrl = true
    - 動態高亮：透過 TcHmi.Controls.get('TcHmiImage1').setSrc() 切換不同 state 的 SVG
              或用 TcHmiUserControl 包裝後以 Symbol Binding 控制各軸 rect 的 stroke/fill
-->
<svg
  viewBox="0 0 320 100"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="320"
  height="100"
>
  <!-- ── 背景 ── -->
  <rect width="320" height="100" fill="#1A1D24"/>

  <!-- ── 機台主體 ── -->
  <!-- 主機台本體 -->
  <rect x="28" y="34" width="264" height="52" rx="3" fill="#252830" stroke="#3A4050" stroke-width="1"/>
  <!-- 頂蓋面板 -->
  <rect x="28" y="22" width="264" height="14" rx="2" fill="#1E2230" stroke="#3A4050" stroke-width="1"/>
  <!-- 導軌橫條（藍色）-->
  <rect x="48" y="18" width="224" height="7" rx="2" fill="#2A3560" stroke="#3A5080" stroke-width="0.5"/>
  <rect x="48" y="18" width="224" height="2" rx="1" fill="#4A70C0" opacity="0.6"/>

  <!-- 左立柱 -->
  <rect x="28" y="22" width="14" height="64" rx="1" fill="#2A2D38" stroke="#3A4050" stroke-width="0.5"/>
  <!-- 右立柱 -->
  <rect x="278" y="22" width="14" height="64" rx="1" fill="#2A2D38" stroke="#3A4050" stroke-width="0.5"/>

  <!-- ── A軸（左上）── -->
  <g id="axis-a">
    <rect x="32" y="12" width="32" height="14" rx="2"
          fill="#1E2230" stroke="#3A4A56" stroke-width="1"/>
    <text x="48" y="22"
          text-anchor="middle"
          font-size="8"
          font-weight="700"
          font-family="'Segoe UI', Arial, sans-serif"
          fill="#7A9BBE">A軸</text>
  </g>
  <!-- A軸 連接線 -->
  <line x1="48" y1="26" x2="42" y2="32" stroke="#3A4A56" stroke-width="0.8" stroke-dasharray="2,1.5"/>

  <!-- ── B軸（中央上）── -->
  <g id="axis-b">
    <rect x="140" y="12" width="32" height="14" rx="2"
          fill="#1E2230" stroke="#3A4A56" stroke-width="1"/>
    <text x="156" y="22"
          text-anchor="middle"
          font-size="8"
          font-weight="700"
          font-family="'Segoe UI', Arial, sans-serif"
          fill="#7A9BBE">B軸</text>
  </g>
  <!-- B軸 連接線 -->
  <line x1="156" y1="26" x2="156" y2="32" stroke="#3A4A56" stroke-width="0.8" stroke-dasharray="2,1.5"/>

  <!-- ── C軸（右上）── -->
  <g id="axis-c">
    <rect x="256" y="12" width="32" height="14" rx="2"
          fill="#1E2230" stroke="#3A4A56" stroke-width="1"/>
    <text x="272" y="22"
          text-anchor="middle"
          font-size="8"
          font-weight="700"
          font-family="'Segoe UI', Arial, sans-serif"
          fill="#7A9BBE">C軸</text>
  </g>
  <!-- C軸 連接線 -->
  <line x1="272" y1="26" x2="278" y2="32" stroke="#3A4A56" stroke-width="0.8" stroke-dasharray="2,1.5"/>

  <!-- ── D軸（前方工作台）── -->
  <g id="axis-d">
    <!-- 工作台本體 -->
    <rect x="100" y="62" width="120" height="26" rx="2"
          fill="#1E2230" stroke="#3A4A56" stroke-width="1"/>
    <!-- D軸標籤 -->
    <text x="160" y="79"
          text-anchor="middle"
          font-size="8"
          font-weight="700"
          font-family="'Segoe UI', Arial, sans-serif"
          fill="#7A9BBE">D軸</text>
  </g>
  <!-- D軸 連接線 -->
  <line x1="160" y1="62" x2="160" y2="56" stroke="#3A4A56" stroke-width="0.8" stroke-dasharray="2,1.5"/>

</svg>
